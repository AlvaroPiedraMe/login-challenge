<section class="sso-callback">
  <div class="sso-callback__card">
    <ng-container *ngIf="!errorMessage">
      <p class="sso-callback__text">{{ 'sso.loading' | translate }}</p>
    </ng-container>
    <ng-container *ngIf="errorMessage">
      <p class="sso-callback__error">{{ 'sso.error' | translate }}</p>
    </ng-container>
  </div>
</section>

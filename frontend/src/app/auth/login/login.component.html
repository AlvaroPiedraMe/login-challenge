<section class="login">
	<div class="login__card">
		<header class="login__header">
			<img
				class="login__brand"
				src="assets/figma-exports/logo-rd.svg"
				alt="realdooh"
			/>
			<p class="login__subtitle">{{ 'login.subtitle' | translate }}</p>
		</header>

		<form class="login__form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
			<div class="login__field">
				<input
					id="email"
					class="login__input"
					type="email"
					formControlName="email"
					[placeholder]="'login.email.placeholder' | translate"
					autocomplete="email"
					autocorrect="off"
					autocapitalize="none"
					spellcheck="false"
				/>
			</div>

			<div class="login__field">
				<div class="login__password">
					<input
						id="password"
						class="login__input login__input--password"
						[type]="showPassword ? 'text' : 'password'"
						formControlName="password"
						[placeholder]="'login.password.placeholder' | translate"
						autocomplete="current-password"
						autocorrect="off"
						autocapitalize="none"
						spellcheck="false"
					/>
					<button
						class="login__toggle"
						type="button"
						(click)="togglePassword()"
						aria-label="Show password"
					>
						<img
							class="login__toggle-icon"
							src="assets/figma-exports/eye-icon-password.png"
							alt=""
						/>
					</button>
				</div>
			</div>

			<p class="login__error" *ngIf="errorMessage">{{ errorMessage }}</p>

			<button
				class="login__button login__button--primary"
				type="submit"
				[disabled]="isLoading"
			>
				{{ isLoading ? ('login.cta.loading' | translate) : ('login.cta.primary' | translate) }}
			</button>

			<p class="login__divider">{{ 'login.divider' | translate }}</p>

			<button
				class="login__button login__button--secondary"
				type="button"
				(click)="onSsoLogin()"
				[disabled]="isSsoLoading"
			>
				{{ isSsoLoading ? ('login.cta.loading' | translate) : ('login.cta.sso' | translate) }}
			</button>
		</form>

		<p class="login__register">
			{{ 'login.register' | translate }}
			<span class="login__register-link">{{ 'login.register_link' | translate }}</span>
		</p>

		<footer class="login__footer">
			<div class="login__language">
				<img
					class="login__language-icon"
					src="assets/figma-exports/global-icon.png"
					alt=""
				/>
				<span class="login__language-text">{{ 'login.language_label' | translate }}</span>
				<span class="login__language-code">{{ languageService.getCurrent().label }}</span>
				<button
					class="login__language-toggle"
					type="button"
					(click)="toggleDropdown()"
					[class.login__language-toggle--open]="dropdownOpen"
				>
					<img
						class="login__language-chevron"
						src="assets/figma-exports/v-icon-left.png"
						alt=""
					/>
				</button>
				<ul class="login__language-dropdown" *ngIf="dropdownOpen">
					<li
						*ngFor="let lang of languageService.getAvailable()"
						class="login__language-option"
						(click)="selectLanguage(lang)"
					>
						{{ lang.label }}
					</li>
				</ul>
			</div>
			<img
				class="login__footer-logo"
				src="assets/figma-exports/econocom-logo.svg"
				alt="Econocom"
			/>
		</footer>
	</div>
</section>

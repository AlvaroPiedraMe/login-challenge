<section class="login">
	<div class="login__card">
		<header class="login__header">
			<img
				class="login__brand"
				src="assets/figma-exports/logo-rd.svg"
				alt="realdooh"
			/>
			<p class="login__subtitle" i18n="@@login.subtitle">
				Inicia sesion en tu cuenta
			</p>
		</header>

		<form class="login__form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
			<div class="login__field">
				<input
					id="email"
					class="login__input"
					type="email"
					formControlName="email"
					placeholder="Correo electronico"
					i18n-placeholder="@@login.email.placeholder"
				/>
			</div>

			<div class="login__field">
				<div class="login__password">
					<input
						id="password"
						class="login__input login__input--password"
						[type]="showPassword ? 'text' : 'password'"
						formControlName="password"
						placeholder="Contrasena"
						i18n-placeholder="@@login.password.placeholder"
					/>
					<button
						class="login__toggle"
						type="button"
						(click)="togglePassword()"
						aria-label="Show password"
					>
						<img
							class="login__toggle-icon"
							src="assets/figma-exports/eye-icon-password.png"
							alt=""
						/>
					</button>
				</div>
			</div>

			<p class="login__error" *ngIf="errorMessage">{{ errorMessage }}</p>

			<button
				class="login__button login__button--primary"
				type="submit"
				[disabled]="isLoading"
				i18n="@@login.cta.primary"
			>
				{{ isLoading ? 'CARGANDO...' : 'ENTRAR' }}
			</button>

			<p class="login__divider" i18n="@@login.divider">Otras formas de acceso:</p>

			<button
				class="login__button login__button--secondary"
				type="button"
				(click)="onSsoLogin()"
				[disabled]="isSsoLoading"
				i18n="@@login.cta.sso"
			>
				{{ isSsoLoading ? 'CARGANDO...' : 'ENTRAR CON SSO' }}
			</button>
		</form>

		<p class="login__register" i18n="@@login.register">
			No tienes cuenta? <span class="login__register-link">Registrate</span>
		</p>

		<footer class="login__footer">
			<div class="login__language" i18n="@@login.language">
				<img
					class="login__language-icon"
					src="assets/figma-exports/global-icon.png"
					alt=""
				/>
				<span class="login__language-text">IDIOMA:</span>
				<span class="login__language-code">ES</span>
				<img
					class="login__language-chevron"
					src="assets/figma-exports/v-icon-left.png"
					alt=""
				/>
			</div>
			<img
				class="login__footer-logo"
				src="assets/figma-exports/econocom-logo.svg"
				alt="Econocom"
			/>
		</footer>
	</div>
</section>

<section class="dashboard">
  <div class="dashboard__card">
    <span class="dashboard__role" [class.dashboard__role--admin]="user?.isAdmin">
      {{ user?.isAdmin ? 'ADMIN' : 'USUARIO' }}
    </span>
    <h1 class="dashboard__title">Bienvenido</h1>
    <p class="dashboard__email">{{ user?.email }}</p>
    <button class="dashboard__logout" (click)="logout()">Cerrar sesion</button>
  </div>
</section>
